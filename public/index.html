<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloom Life — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9f9f7;color:#1a1a1a}
.app{max-width:980px;margin:0 auto;padding:1.5rem 1rem 3rem}
.header{display:flex;align-items:center;justify-content:space-between;padding-bottom:1rem;border-bottom:1px solid #e8e8e4;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.logo{font-size:18px;font-weight:700;letter-spacing:-0.3px}.logo span{color:#1D9E75}
.sync{font-size:11px;color:#888}
.alert-bar{background:#FCEBEB;border:1px solid #F09595;border-radius:10px;padding:10px 16px;font-size:12px;color:#A32D2D;margin-bottom:1rem;display:none}
.alert-bar.show{display:flex;align-items:center;gap:8px}
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.filter-bar label{font-size:11px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.filter-bar input[type=date]{font-size:12px;padding:5px 10px;border:1px solid #e0e0db;border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit}
.filter-bar button{font-size:12px;padding:5px 14px;border-radius:8px;border:1px solid #1D9E75;background:#1D9E75;color:#fff;cursor:pointer;font-family:inherit;font-weight:500}
.filter-bar button.reset{background:#fff;color:#999;border-color:#e0e0db}
.nav-groups{display:flex;flex-direction:column;gap:6px;margin-bottom:1.5rem}
.nav-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.nav-group-label{font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.6px;min-width:80px}
.nav-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid #e0e0db;background:#fff;color:#666;cursor:pointer;transition:all .15s;font-family:inherit}
.nav-btn:hover{border-color:#1D9E75;color:#1D9E75}
.nav-btn.active{background:#1D9E75;color:#fff;border-color:#1D9E75;font-weight:600}
.section{display:none}.section.active{display:block}
.sec-label{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.6px;margin:1.25rem 0 .75rem}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem}
.kpi{background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:14px 16px}
.kpi-label{font-size:11px;color:#999;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:700;color:#1a1a1a;line-height:1}
.kpi-sub{font-size:11px;color:#999;margin-top:4px}
.up{color:#1D9E75}.down{color:#D85A30}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
.card{background:#fff;border:1px solid #e8e8e4;border-radius:14px;padding:1rem 1.25rem;margin-bottom:12px}
.card-title{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:1rem}
.tbl{width:100%;font-size:12px;border-collapse:collapse}
.tbl th{color:#999;font-weight:600;text-align:left;padding:4px 0 8px;border-bottom:1px solid #f0f0ec}
.tbl td{padding:8px 0;border-bottom:1px solid #f0f0ec;color:#1a1a1a;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafaf8}
.badge{display:inline-block;font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700}
.b-paid{background:#E1F5EE;color:#0F6E56}.b-pending{background:#FAEEDA;color:#854F0B}.b-cancelled{background:#FCEBEB;color:#A32D2D}.b-open{background:#E6F1FB;color:#185FA5}.b-abandoned{background:#F1EFE8;color:#5F5E5A}.b-new{background:#E6F1FB;color:#185FA5}.b-rec{background:#E1F5EE;color:#0F6E56}.b-warn{background:#FFF3E0;color:#E65100}
.progress-wrap{width:100%;background:#f0f0ec;border-radius:4px;height:5px;margin-top:3px}
.progress-bar{height:5px;border-radius:4px;background:#1D9E75}
.chart-wrap{position:relative;width:100%}
.loading{text-align:center;padding:4rem 1rem;color:#999;font-size:14px}
.loading-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#1D9E75;margin:0 3px;animation:bounce 1.2s infinite}
.loading-dot:nth-child(2){animation-delay:.2s}.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.error{background:#FCEBEB;border-radius:12px;padding:14px 18px;font-size:13px;color:#A32D2D;margin-bottom:1rem}
.row-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0ec;font-size:12px}
.row-item:last-child{border-bottom:none}
.avatar{width:30px;height:30px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#0F6E56;flex-shrink:0}
.customer-row{display:flex;align-items:center;gap:8px}
.empty{text-align:center;padding:1.5rem;color:#999;font-size:12px}
.month-selector{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.month-btn{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid #e0e0db;background:#fff;color:#666;cursor:pointer;font-family:inherit}
.month-btn.active{background:#1D9E75;color:#fff;border-color:#1D9E75;font-weight:600}
.login-overlay{position:fixed;inset:0;background:#f9f9f7;display:flex;align-items:center;justify-content:center;z-index:100}
.login-box{background:#fff;border:1px solid #e8e8e4;border-radius:20px;padding:2.5rem 2rem;width:320px;text-align:center}
.login-logo{font-size:22px;font-weight:700;margin-bottom:.5rem}.login-logo span{color:#1D9E75}
.login-sub{font-size:13px;color:#999;margin-bottom:1.5rem}
.login-input{width:100%;padding:10px 14px;border:1px solid #e0e0db;border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:10px;outline:none}
.login-input:focus{border-color:#1D9E75}
.login-btn{width:100%;padding:10px;background:#1D9E75;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.login-err{font-size:12px;color:#D85A30;margin-top:8px;display:none}
#map-container svg{width:100%;height:auto}
.demo-gender-bar{display:flex;height:28px;border-radius:8px;overflow:hidden;margin:12px 0}
.demo-gender-bar div{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;transition:width .5s}
.coverage-note{font-size:11px;color:#999;background:#f9f9f7;border-radius:8px;padding:8px 12px;margin-top:8px}
.stock-alert{border-radius:10px;padding:10px 14px;font-size:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.stock-alert.warn{background:#FFF3E0;border:1px solid #FFB74D;color:#E65100}
.stock-alert.critical{background:#FCEBEB;border:1px solid #F09595;color:#A32D2D}
.stock-alert.low{background:#FFFDE7;border:1px solid #FDD835;color:#F57F17}
.tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:12px;background:#f0f0ec;color:#666;margin:2px}
@media(max-width:540px){.grid2{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}.nav-group-label{display:none}}
</style>
</head>
<body>
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">Bloom<span>Life</span></div>
    <div class="login-sub">Ingresá la contraseña para acceder</div>
    <input class="login-input" type="password" id="pwInput" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Ingresar</button>
    <div class="login-err" id="loginErr">Contraseña incorrecta</div>
  </div>
</div>
<div class="app">
  <div class="header">
    <div class="logo">Bloom<span>Life</span> — Dashboard</div>
    <div class="sync" id="sync-time">Cargando...</div>
  </div>
  <div class="alert-bar" id="alertBar"><span>⚠</span><span id="alertMsg"></span></div>
  <div class="filter-bar">
    <label>Período:</label>
    <input type="date" id="dateFrom">
    <span style="font-size:12px;color:#999">hasta</span>
    <input type="date" id="dateTo">
    <button onclick="applyFilter()">Aplicar</button>
    <button class="reset" onclick="resetFilter()">Ver todo</button>
    <span id="filter-active" style="font-size:11px;color:#1D9E75;display:none">● Filtro activo</span>
  </div>
  <div class="nav-groups">
    <div class="nav-row">
      <span class="nav-group-label">Ventas</span>
      <button class="nav-btn active" onclick="showSection('resumen')">Resumen</button>
      <button class="nav-btn" onclick="showSection('ventas')">Detalle ventas</button>
      <button class="nav-btn" onclick="showSection('recompra')">Recompra</button>
      <button class="nav-btn" onclick="showSection('canales')">Canales</button>
    </div>
    <div class="nav-row">
      <span class="nav-group-label">Productos</span>
      <button class="nav-btn" onclick="showSection('productos')">Productos</button>
      <button class="nav-btn" onclick="showSection('stock')">Stock</button>
    </div>
    <div class="nav-row">
      <span class="nav-group-label">Clientes</span>
      <button class="nav-btn" onclick="showSection('clientes')">Clientes</button>
      <button class="nav-btn" onclick="showSection('demografia')">Demografía</button>
      <button class="nav-btn" onclick="showSection('suscripciones')">Suscripciones</button>
    </div>
    <div class="nav-row">
      <span class="nav-group-label">Operaciones</span>
      <button class="nav-btn" onclick="showSection('pedidos')">Pedidos</button>
      <button class="nav-btn" onclick="showSection('abandonados')">Abandonados</button>
    </div>
  </div>
  <div id="main"><div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div><p style="margin-top:1rem">Conectando con Tienda Nube...</p></div></div>
</div>
<script>
const PROXY='';
const PASSWORD='bloom2026';
let ALL_ORDERS=[],ALL_PRODUCTS=[],ALL_ABANDONED=[],FILTERED_ORDERS=[];
let CHARTS={};
let SELECTED_RECOMPRA_MONTH=null;
 
const NOMBRES_F=new Set(['maria','ana','laura','carolina','andrea','patricia','claudia','alejandra','gabriela','marcela','silvana','valeria','paula','natalia','veronica','monica','daniela','fernanda','cecilia','florencia','lucia','sofia','valentina','camila','agustina','martina','julieta','melina','sabrina','vanessa','roxana','viviana','norma','beatriz','rosa','isabel','susana','graciela','miriam','nora','alicia','mariana','sandra','jimena','romina','gisela','lorena','karina','paola','noelia','brenda','soledad','celeste','aldana','rocio','micaela','belen','giuliana','antonella','bianca','lourdes','magali','ayelen','estefania','marisol','daiana','yasmin','ruth','elisa','silvia','victoria','dolores','adriana','irene','liliana','rebeca','esperanza','pilar','mercedes','josefina','constanza','emilia','renata','emma','mia','zoe','lara','abril','naomi','stefania','malena','candela','marina','guadalupe','paloma','catalina','alma','clara','nadia','tamara','ivana','cinthia','cintia','eliana','yesica','jessica','barbara','evelyn','maira','gina','fatima','azul','mora','elsa','martha','dora','sara','elena','ines','amalia','herminia','olga','hilda','amanda','stella','ofelia','gladys','mirta','raquel','analia','margarita','estela','griselda','mabel']);
const NOMBRES_M=new Set(['juan','carlos','luis','jose','jorge','roberto','diego','pablo','daniel','sergio','miguel','alejandro','gabriel','martin','nicolas','andres','gustavo','ricardo','marcelo','alberto','hector','oscar','hernan','mario','raul','fernando','pedro','ariel','leandro','federico','ignacio','maximiliano','sebastian','christian','matias','facundo','ezequiel','rodrigo','joaquin','santiago','franco','gonzalo','walter','hugo','ruben','javier','dante','ramiro','emilio','nahuel','agustin','lucas','tomas','marcos','lautaro','julian','alan','brian','kevin','ivan','enzo','maximo','thiago','benicio','bautista','valentino','gael','luca','benjamin','alexander','alexis','cristian','damian','esteban','francisco','manuel','antonio','eduardo','alfredo','ernesto','horacio','abel','cesar','german','claudio','omar','felix','victor','angel','rafael','luciano','mariano','fabian','david','joel','simon','patricio','augusto','emiliano','leonel','axel','norberto','gerardo','rolando','armando','nelson','arturo','silvio','renato','cristobal','mauricio','lisandro','salvador','adolfo']);
 
function inferGender(n){if(!n)return'unknown';const f=n.trim().split(/\s+/)[0].toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');if(NOMBRES_F.has(f))return'F';if(NOMBRES_M.has(f))return'M';if(f.endsWith('a')&&!f.endsWith('oa')&&f.length>3)return'F';return'unknown';}
function extractDNI(id){if(!id)return null;const c=id.replace(/[^0-9]/g,'');if(c.length===11)return parseInt(c.slice(2,10));if(c.length>=7&&c.length<=8)return parseInt(c);return null;}
function dniToAgeRange(d){if(!d||isNaN(d))return null;if(d<4000000)return'70+';if(d<8000000)return'60-69';if(d<14000000)return'50-59';if(d<20000000)return'40-49';if(d<26000000)return'35-39';if(d<30000000)return'30-34';if(d<34000000)return'25-29';if(d<38000000)return'20-24';if(d<42000000)return'15-19';return'<15';}
const AGE_ORDER=['<15','15-19','20-24','25-29','30-34','35-39','40-49','50-59','60-69','70+'];
 
function doLogin(){const v=document.getElementById('pwInput').value;if(v===PASSWORD){sessionStorage.setItem('bl_auth','ok');document.getElementById('loginOverlay').style.display='none';init();}else{document.getElementById('loginErr').style.display='block';}}
window.addEventListener('DOMContentLoaded',()=>{if(sessionStorage.getItem('bl_auth')==='ok'){document.getElementById('loginOverlay').style.display='none';init();}});
 
const fmt=n=>new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(n||0);
const fmtN=n=>new Intl.NumberFormat('es-AR').format(Math.round(n||0));
const getName=o=>{if(!o)return'?';if(typeof o==='string')return o;return o.es||o.en||Object.values(o)[0]||'?';};
const initials=n=>{if(!n)return'?';return n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();};
function statusBadge(s){const m={paid:['Pagado','b-paid'],pending:['Pendiente','b-pending'],cancelled:['Cancelado','b-cancelled'],open:['Abierto','b-open'],voided:['Anulado','b-cancelled'],refunded:['Reembolsado','b-cancelled'],abandoned:['Abandonado','b-abandoned']};const[l,c]=m[s]||[s,'b-pending'];return`<span class="badge ${c}">${l}</span>`;}
function mkChart(id,type,labels,datasets,opts){if(CHARTS[id])CHARTS[id].destroy();const ctx=document.getElementById(id);if(!ctx)return;CHARTS[id]=new Chart(ctx,{type,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},...(opts?.plugins||{})},...opts}});}
const tickY=v=>{if(v>=1000000)return'$'+(v/1000000).toFixed(1)+'M';if(v>=1000)return'$'+(v/1000).toFixed(0)+'k';return'$'+v;};
 
function applyFilter(){const from=document.getElementById('dateFrom').value,to=document.getElementById('dateTo').value;if(!from&&!to){resetFilter();return;}FILTERED_ORDERS=ALL_ORDERS.filter(o=>{const d=new Date(o.created_at);if(from&&d<new Date(from))return false;if(to&&d>new Date(to+'T23:59:59'))return false;return true;});document.getElementById('filter-active').style.display='inline';renderAll();}
function resetFilter(){FILTERED_ORDERS=[...ALL_ORDERS];document.getElementById('dateFrom').value='';document.getElementById('dateTo').value='';document.getElementById('filter-active').style.display='none';renderAll();}
 
window.showSection=function(id){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('onclick')?.includes("'"+id+"'")));document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id==='sec-'+id));};
 
async function apiFetch(path){const r=await fetch(PROXY+'/api/'+path);if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}
async function fetchAllOrders(){let all=[],page=1;while(true){const b=await apiFetch('orders?per_page=200&page='+page);if(!Array.isArray(b)||!b.length)break;all=all.concat(b);if(b.length<200)break;page++;if(page>15)break;}return all;}
async function fetchAbandoned(){try{let all=[],page=1;while(true){const b=await apiFetch('checkouts?per_page=200&page='+page);if(!Array.isArray(b)||!b.length)break;all=all.concat(b);if(b.length<200)break;page++;if(page>5)break;}return all;}catch(e){return[];}}
 
window.selectRecompraMonth=function(k){SELECTED_RECOMPRA_MONTH=k;renderRecompraDetail(k);document.querySelectorAll('.month-btn').forEach(b=>b.classList.toggle('active',b.dataset.k===k));};
 
function renderRecompraDetail(k){
  const paid=FILTERED_ORDERS.filter(o=>o.payment_status==='paid');
  const mNames=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const[y,m]=k.split('-');
  const monthStart=new Date(parseInt(y),parseInt(m)-1,1),monthEnd=new Date(parseInt(y),parseInt(m),1);
  const prevMap={};
  paid.filter(o=>new Date(o.created_at)<monthStart).forEach(o=>{const e=o.customer?.email;if(!e)return;if(!prevMap[e])prevMap[e]={lastDate:o.created_at,count:0,rev:0};prevMap[e].count++;prevMap[e].rev+=parseFloat(o.total||0);if(o.created_at>prevMap[e].lastDate)prevMap[e].lastDate=o.created_at;});
  const seen=new Set(),rows=[];
  paid.filter(o=>{const d=new Date(o.created_at);return d>=monthStart&&d<monthEnd;}).forEach(o=>{const e=o.customer?.email;if(!e||seen.has(e))return;seen.add(e);const isNew=!prevMap[e],prev=prevMap[e],daysSince=prev?Math.round((monthStart-new Date(prev.lastDate))/(1000*3600*24)):null;rows.push({name:o.customer?.name||o.contact_name||e,email:e,isNew,lastDate:prev?.lastDate,daysSince,prevOrders:prev?.count||0,prevRev:prev?.rev||0,thisOrderTotal:parseFloat(o.total||0)});});
  rows.sort((a,b)=>a.isNew-b.isNew||b.prevOrders-a.prevOrders);
  const label=mNames[parseInt(m)-1]+"'"+y.slice(2),newCount=rows.filter(r=>r.isNew).length,recCount=rows.filter(r=>!r.isNew).length;
  document.getElementById('recompra-detail').innerHTML=`<div class="card"><div class="card-title">${label} — ${rows.length} compradores <span style="font-size:11px;font-weight:400;color:#999;margin-left:8px">${newCount} nuevos · ${recCount} recurrentes</span></div><table class="tbl"><thead><tr><th>Cliente</th><th>Tipo</th><th>Pedidos prev.</th><th>Gasto prev.</th><th>Última compra</th><th>Días</th><th>Este mes</th></tr></thead><tbody>${rows.map(r=>`<tr><td><div style="font-weight:600">${r.name}</div><div style="font-size:10px;color:#999;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.email}</div></td><td>${r.isNew?'<span class="badge b-new">Nuevo</span>':'<span class="badge b-rec">Recurrente</span>'}</td><td style="color:#999">${r.prevOrders||'—'}</td><td>${r.prevRev?fmt(r.prevRev):'—'}</td><td style="color:#999;font-size:11px">${r.lastDate?new Date(r.lastDate).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'}):'—'}</td><td style="color:${r.daysSince!==null?(r.daysSince<=30?'#1D9E75':r.daysSince<=90?'#EF9F27':'#D85A30'):'#999'}">${r.daysSince!==null?r.daysSince+'d':'—'}</td><td style="font-weight:600">${fmt(r.thisOrderTotal)}</td></tr>`).join('')}</tbody></table></div>`;
}
 
function buildMap(provData){
  const container=document.getElementById('map-container');if(!container)return;container.innerHTML='';
  const norm={'capital federal':'Ciudad Autónoma de Buenos Aires','caba':'Ciudad Autónoma de Buenos Aires','buenos aires':'Buenos Aires','gba':'Buenos Aires','cordoba':'Córdoba','córdoba':'Córdoba','santa fe':'Santa Fe','mendoza':'Mendoza','tucuman':'Tucumán','tucumán':'Tucumán','entre rios':'Entre Ríos','entre ríos':'Entre Ríos','salta':'Salta','misiones':'Misiones','chaco':'Chaco','corrientes':'Corrientes','santiago del estero':'Santiago del Estero','san juan':'San Juan','jujuy':'Jujuy','rio negro':'Río Negro','río negro':'Río Negro','neuquen':'Neuquén','neuquén':'Neuquén','formosa':'Formosa','chubut':'Chubut','san luis':'San Luis','catamarca':'Catamarca','la rioja':'La Rioja','la pampa':'La Pampa','santa cruz':'Santa Cruz','tierra del fuego':'Tierra del Fuego'};
  const normalized={};Object.entries(provData).forEach(([k,v])=>{const nk=norm[k.toLowerCase()]||k;normalized[nk]=(normalized[nk]||0)+v;});
  const maxV=Math.max(...Object.values(normalized),1),color=d3.scaleSequential([0,maxV],d3.interpolate('#E1F5EE','#085041'));
  d3.json('https://cdn.jsdelivr.net/npm/datamaps@0.5.10/src/js/data/arg.topo.json').then(topo=>{

  <div id="sec-pedidos" class="section">
    <div class="sec-label">Historial de pedidos</div>
    <div class="card"><table class="tbl"><thead><tr><th>#</th><th>Fecha</th><th>Cliente</th><th>Items</th><th>Total</th><th>Estado</th></tr></thead><tbody>${[...orders].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,50).map(o=>`<tr><td style="color:#999;font-size:11px">${o.number}</td><td style="color:#999;font-size:11px;white-space:nowrap">${new Date(o.created_at).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'})}</td><td style="max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.customer?.name||o.contact_name||'—'}</td><td style="color:#999;font-size:11px">${(o.products||[]).length}</td><td style="font-weight:600">${fmt(parseFloat(o.total||0))}</td><td>${statusBadge(o.payment_status)}</td></tr>`).join('')}</tbody></table>${orders.length>50?`<div style="text-align:center;padding:12px;font-size:12px;color:#999">Mostrando 50 de ${fmtN(orders.length)} pedidos</div>`:''}</div>
    <div class="sec-label">Distribución geográfica</div>
    <div class="grid2">
      <div class="card" id="map-container" style="min-height:300px"></div>
      <div class="card"><div class="card-title">Pedidos por provincia</div>${sortedProv.map(([p,c])=>`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px"><span>${p}</span><span style="font-weight:600">${fmtN(c)}</span></div><div class="progress-wrap"><div class="progress-bar" style="width:${Math.round(c/maxProv*100)}%"></div></div></div>`).join('')}</div>
    </div>
  </div>
 
  <div id="sec-abandonados" class="section">
    <div class="sec-label">Carritos abandonados</div>
    ${ALL_ABANDONED.length===0?'<div class="card"><div class="empty">No se encontraron carritos abandonados. El endpoint /checkouts puede requerir permisos adicionales en Tienda Nube.</div></div>':`
    <div class="kpis">
      <div class="kpi"><div class="kpi-label">Carritos abandonados</div><div class="kpi-value down">${fmtN(ALL_ABANDONED.length)}</div><div class="kpi-sub">en el período</div></div>
      <div class="kpi"><div class="kpi-label">Monto potencial</div><div class="kpi-value">${fmt(abandRev)}</div><div class="kpi-sub">en carritos sin cerrar</div></div>
      <div class="kpi"><div class="kpi-label">Promedio por carrito</div><div class="kpi-value">${ALL_ABANDONED.length?fmt(abandRev/ALL_ABANDONED.length):'—'}</div><div class="kpi-sub"> </div></div>
      <div class="kpi"><div class="kpi-label">Tasa abandono</div><div class="kpi-value">${(paid.length+ALL_ABANDONED.length)>0?((ALL_ABANDONED.length/(paid.length+ALL_ABANDONED.length))*100).toFixed(1)+'%':'—'}</div><div class="kpi-sub">vs pedidos pagados</div></div>
    </div>
    <div class="card"><div class="card-title">Carritos abandonados recientes</div><table class="tbl"><thead><tr><th>Fecha</th><th>Cliente</th><th>Email</th><th>Monto</th><th>Productos</th></tr></thead><tbody>${[...ALL_ABANDONED].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,30).map(c=>`<tr><td style="color:#999;font-size:11px;white-space:nowrap">${new Date(c.created_at).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'})}</td><td style="max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.contact_name||c.customer?.name||'—'}</td><td style="font-size:11px;color:#999;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.contact_email||c.customer?.email||'—'}</td><td style="font-weight:600">${fmt(parseFloat(c.total||c.subtotal||0))}</td><td style="color:#999;font-size:11px">${(c.products||[]).map(p=>getName(p.name)).slice(0,2).join(', ')}</td></tr>`).join('')}</tbody></table></div>`}
  </div>
  `;
 
  document.getElementById('sync-time').textContent='Actualizado: '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  if(SELECTED_RECOMPRA_MONTH)renderRecompraDetail(SELECTED_RECOMPRA_MONTH);
 
  setTimeout(()=>{
    mkChart('chartMonthly','bar',mLabels,[{data:mVals,backgroundColor:'#1D9E75',borderRadius:4,borderSkipped:false}],{scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},callback:tickY}}}});
    mkChart('chartDaily','line',dLabels,[{data:dVals,borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.08)',fill:true,tension:.3,pointRadius:2}],{scales:{x:{grid:{display:false},ticks:{font:{size:10},maxTicksLimit:10}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},callback:tickY}}}});
    mkChart('chartTicketEvol','line',mLabels,[{data:mTickets,borderColor:'#185FA5',backgroundColor:'rgba(24,95,165,0.07)',fill:true,tension:.3,pointRadius:3,pointBackgroundColor:'#185FA5'}],{scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},callback:tickY}}},plugins:{tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.parsed.y)}}}});
    mkChart('chartDow','bar',dowLabels,[{data:dowAvg,backgroundColor:'#5DCAA5',borderRadius:4}],{scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:10},callback:tickY}}}});
    mkChart('chartProd','bar',sortedSkus.slice(0,6).map(([n])=>n.length>22?n.slice(0,22)+'…':n),[{data:sortedSkus.slice(0,6).map(([,d])=>Math.round(d.rev)),backgroundColor:'#1D9E75',borderRadius:4}],{indexAxis:'y',scales:{x:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:10},callback:tickY}},y:{grid:{display:false},ticks:{font:{size:11}}}}});
    mkChart('chartTicket','bar',ticketByProd.slice(0,8).map(p=>p.name.length>22?p.name.slice(0,22)+'…':p.name),[{data:ticketByProd.slice(0,8).map(p=>Math.round(p.ticket)),backgroundColor:'#5DCAA5',borderRadius:4}],{indexAxis:'y',scales:{x:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:10},callback:tickY}},y:{grid:{display:false},ticks:{font:{size:11}}}}});
    mkChart('chartCohort','doughnut',['Activos (30d)','Inactivos (31-90d)','Sin compras recientes'],[{data:[cohorts.active,cohorts.lapsed,cohorts.old],backgroundColor:['#1D9E75','#EF9F27','#B4B2A9'],borderWidth:0}],{plugins:{legend:{display:true,position:'bottom',labels:{font:{size:11},boxWidth:10,padding:12}}}});
    mkChart('chartRecompra','line',recompraData.map(r=>r.label),[{data:recompraData.map(r=>r.pct),borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.08)',fill:true,tension:.3,pointRadius:4,pointBackgroundColor:'#1D9E75'}],{scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},callback:v=>v+'%'},max:100}},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.raw+'%'}}}});
    mkChart('chartNuevosVsRec','bar',recompraData.map(r=>r.label),[{label:'Nuevos',data:recompraData.map(r=>r.nuevos),backgroundColor:'#185FA5',borderRadius:3},{label:'Recurrentes',data:recompraData.map(r=>r.recurrentes),backgroundColor:'#1D9E75',borderRadius:3}],{scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11}}}},plugins:{legend:{display:true,position:'bottom',labels:{font:{size:11},boxWidth:10,padding:12}}}});
    mkChart('chartUtm','bar',sortedUtm.map(([k])=>k.length>22?k.slice(0,22)+'…':k),[{data:sortedUtm.map(([,d])=>Math.round(d.rev)),backgroundColor:'#1D9E75',borderRadius:4}],{indexAxis:'y',scales:{x:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:10},callback:tickY}},y:{grid:{display:false},ticks:{font:{size:11}}}}});
    if(subCount>0){
      mkChart('chartMRR','bar',subMLabels,[{data:subMRR,backgroundColor:'#1D9E75',borderRadius:4,borderSkipped:false}],{scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},callback:tickY}}}});
      mkChart('chartSubNew','bar',subMLabels,[{data:subNew,backgroundColor:'#5DCAA5',borderRadius:4}],{scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},beginAtZero:true}}}});
    }
    if(demoData){
      mkChart('chartNewCusts','bar',demoData.newMonthLabels,[{data:demoData.newMonthVals,backgroundColor:'#1D9E75',borderRadius:4}],{scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},beginAtZero:true}}}});
      if(demoData.ageRanges.length>0){
        mkChart('chartAge','bar',demoData.ageRanges,[{data:demoData.ageRanges.map(r=>demoData.ageMap[r].count),backgroundColor:'#1D9E75',borderRadius:4}],{scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},beginAtZero:true}}}});
        mkChart('chartAgeRev','bar',demoData.ageRanges,[{data:demoData.ageRanges.map(r=>Math.round(demoData.ageMap[r].rev)),backgroundColor:'#5DCAA5',borderRadius:4}],{scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},callback:tickY}}}});
      }
    }
    setTimeout(()=>buildMap(provMap),200);
  },150);
}
 
async function init(){
  try{
    document.getElementById('main').innerHTML='<div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div><p style="margin-top:1rem">Cargando datos de Bloom Life...</p></div>';
    const[orders,products,abandoned]=await Promise.all([fetchAllOrders(),apiFetch('products?per_page=200'),fetchAbandoned()]);
    ALL_ORDERS=orders;ALL_PRODUCTS=products;ALL_ABANDONED=abandoned;
    FILTERED_ORDERS=[...ALL_ORDERS];
    renderAll();
  }catch(e){
    document.getElementById('main').innerHTML='<div class="error">Error al conectar: '+e.message+'. Esperá 40 segundos y recargá.</div>';
    document.getElementById('sync-time').textContent='Error de conexión';
  }
}
</script>
</body>
</html>
